spring.application.name=SecurityLastChance

spring.security.user.name=your-admin-user
spring.security.user.password=your-admin-password

server.servlet.session.cookie.same-site=strict

spring.datasource.url=jdbc:postgresql://localhost:5432/your_database
spring.datasource.username=your_db_user
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Show exception message in API 500 responses (set false in production)
app.errors.include-exception-message=true
